name: Keep Databricks App running

on:
  schedule:
    # Check frequently so an unexpected Free Edition stop has a short outage.
    # Offset from the top of the hour to reduce GitHub scheduler congestion.
    - cron: "7-57/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-data-legend-app-running
  cancel-in-progress: false

jobs:
  restart-if-due:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_NAME: data-legend-app
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Install Databricks CLI
        uses: databricks/setup-cli@v1.3.0

      - name: Recover stopped app or refresh it after 20 hours
        shell: bash
        run: |
          set -euo pipefail

          app_json="$(databricks apps get "$APP_NAME" -o json)"
          read -r app_state compute_state update_epoch source_path < <(
            APP_JSON="$app_json" python - <<'PY'
          import datetime
          import json
          import os

          app = json.loads(os.environ["APP_JSON"])
          updated = datetime.datetime.fromisoformat(app["update_time"].replace("Z", "+00:00"))
          print(
              app["app_status"]["state"],
              app["compute_status"]["state"],
              int(updated.timestamp()),
              app["default_source_code_path"],
          )
          PY
          )

          if [[ "$compute_state" == "UPDATING" ]]; then
            echo "App compute is already updating; skipping this check."
            exit 0
          fi

          now_epoch="$(date -u +%s)"
          age_hours="$(( (now_epoch - update_epoch) / 3600 ))"

          if [[ "$app_state" == "RUNNING" ]]; then
            if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" && "$age_hours" -lt 20 ]]; then
              echo "App is running and was updated ${age_hours} hours ago; no refresh needed."
              exit 0
            fi

            # Refresh with a rolling deployment instead of deliberately stopping
            # healthy compute and creating an avoidable outage.
            databricks apps deploy "$APP_NAME" \
              --source-code-path "$source_path" \
              --mode SNAPSHOT \
              --timeout 20m
          else
            databricks apps start "$APP_NAME" --timeout 20m
          fi

          for _ in {1..60}; do
            final_json="$(databricks apps get "$APP_NAME" -o json)"
            final_state="$(
              APP_JSON="$final_json" python -c \
                'import json, os; print(json.loads(os.environ["APP_JSON"])["app_status"]["state"])'
            )"
            if [[ "$final_state" == "RUNNING" ]]; then
              echo "App is RUNNING."
              exit 0
            fi
            sleep 10
          done

          echo "App did not reach RUNNING state within 10 minutes." >&2
          exit 1
